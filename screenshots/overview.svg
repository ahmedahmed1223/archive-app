  <rect class="item" x="120" y="220" width="300" height="80" rx="18" />
  <rect class="item" x="120" y="320" width="300" height="80" rx="18" />
  <rect class="item" x="120" y="420" width="300" height="80" rx="18" />
  <rect class="item" x="450" y="220" width="560" height="260" rx="20" />
  <text x="480" y="310" class="label">مشغل الفيديو</text>
  <rect class="button" x="480" y="360" width="240" height="60" rx="14" />
  <text x="518" y="402" class="button-text">تشغيل الفيديو</text>
  <circle cx="780" cy="430" r="24" fill="#f59e0b" />
