    .item { fill: #1f2937; stroke: #475569; stroke-width: 2; }
    .label { fill: #94a3b8; font-size: 22px; }
    .button { fill: #10b981; }
    .button-text { fill: white; font-size: 20px; }
  </style>
  <rect class="bg" width="1200" height="700" rx="30" />
  <rect class="panel" x="80" y="70" width="1040" height="560" rx="24" />
  <rect class="header" x="80" y="70" width="1040" height="100" rx="24" />
